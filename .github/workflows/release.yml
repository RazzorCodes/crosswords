name: Release

on:
  push:
    tags:
      - release-*
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (X.Y.Z); optional if ref already encodes it"
        required: false

jobs:
  release:
    runs-on: arc-runner-set-crosswords
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "push" ]; then
            VERSION="${REF_NAME#release-}"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="${INPUT_VERSION:-}"
            if [ -z "$VERSION" ]; then
              VERSION="${REF_NAME#release-}"
              VERSION="${VERSION#v}"
            fi
          else
            echo "Unsupported event '$EVENT_NAME'."
            exit 1
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version '$VERSION'. Expected strict X.Y.Z."
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$VERSION" >> "$GITHUB_ENV"
          echo "GIT_TAG=release-$VERSION" >> "$GITHUB_ENV"

      - name: Tag repository
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse "${{ env.GIT_TAG }}" >/dev/null 2>&1; then
            echo "Creating tag ${{ env.GIT_TAG }}"
            git tag "${{ env.GIT_TAG }}"
            git push origin "${{ env.GIT_TAG }}"
          else
            echo "Tag ${{ env.GIT_TAG }} already exists"
          fi

      - name: Wait for Docker
        run: until docker info >/dev/null 2>&1; do sleep 1; done

      - name: Build and Push App Container
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/$OWNER/crosswords-app
          docker build -t $IMAGE:${{ env.RELEASE_TAG }} -t $IMAGE:latest -f src/app/Containerfile.release .
          docker push $IMAGE:${{ env.RELEASE_TAG }}
          docker push $IMAGE:latest

      - uses: azure/setup-helm@v4

      - name: Package and push chart
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          # Remove 'v' from version for helm if it's there, but here VERSION is just X.Y.Z
          helm package deploy/helm --version ${{ env.VERSION }} --app-version ${{ env.VERSION }}
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push crosswords-${{ env.VERSION }}.tgz oci://ghcr.io/$OWNER/charts

      - name: Install dependencies
        run: |
          if command -v apk >/dev/null 2>&1; then
            sudo apk add --no-cache zip
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y zip
          else
            echo "Unknown package manager"
            exit 1
          fi

      - name: Package Assets
        run: |
          chmod +x deploy/scripts/package-assets.sh
          ./deploy/scripts/package-assets.sh ${{ env.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.GIT_TAG }}
          name: Release ${{ env.VERSION }}
          files: |
            dist/*.zip
            models/*.onnx
            crosswords-${{ env.VERSION }}.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
