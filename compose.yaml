services:
  app:
    build:
      context: .
      dockerfile: app/Containerfile
      args:
        VITE_SRV_URL: http://localhost:8000
        VITE_TRAIN_MODE: ${VITE_TRAIN_MODE:-false}
    ports:
      - "5173:80"
    volumes:
      - ./models:/app/models:ro,z
    depends_on:
      - srv

  srv:
    build:
      context: .
      dockerfile: srv/Containerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data:z
    environment:
      - DATA_ROOT=/data

  ai:
    build:
      context: .
      dockerfile: ai/Containerfile
    volumes:
      - ./data:/data:z
      - ./models:/models:z
    environment:
      - DATA_ROOT=/data
      - MODELS_DIR=/models
      - TRAIN_POLL_SECONDS=10
      - TRAIN_MIN_INTERVAL_SECONDS=60
      - TRAIN_MIN_SAMPLES_DELTA=10
    command: ["python", "ai/train_loop.py"]
    profiles:
      - train
