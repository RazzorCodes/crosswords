services:
  app:
    build:
      context: ./app
    ports:
      - "5173:80"
    volumes:
      - ./models:/app/models:ro,z
    environment:
      - VITE_SRV_URL=http://localhost:8000
    depends_on:
      - srv

  srv:
    build:
      context: ./srv
    ports:
      - "8000:8000"
    volumes:
      - ./dataset:/data/dataset:z
      - ./dataset.jsonl:/data/legacy-dataset.jsonl:z
    environment:
      - DATA_DIR=/data/dataset
      - DATA_PATH=/data/legacy-dataset.jsonl

  ai:
    build:
      context: ./ai
    volumes:
      - ./dataset:/data/dataset:z
      - ./dataset.jsonl:/data/legacy-dataset.jsonl:ro,z
      - ./models:/models:z
    environment:
      - DATA_DIR=/data/dataset
      - DATA_PATH=/data/legacy-dataset.jsonl
      - MODELS_DIR=/models
      - TRAIN_POLL_SECONDS=10
      - TRAIN_MIN_INTERVAL_SECONDS=60
      - TRAIN_MIN_SAMPLES_DELTA=10
    command: ["python", "train_loop.py"]
    profiles:
      - train
