services:
  app:
    build:
      context: .
      dockerfile: src/app/Containerfile
      args:
        VITE_SRV_URL: http://localhost:8000
        VITE_TRAIN_MODE: ${VITE_TRAIN_MODE:-false}
    ports:
      - "5173:80"
    volumes:
      - models-data:/app/models:ro
    depends_on:
      - srv

  srv:
    build:
      context: .
      dockerfile: src/srv/Containerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data:z
    env_file:
      - .env
    environment:
      - DATA_ROOT=/data
      - EXTERNAL_TEACHER_ENABLED=${EXTERNAL_TEACHER_ENABLED:-0}
      - TEACHER_OPENAPI_ENDPOINT=${TEACHER_OPENAPI_ENDPOINT}
      - TEACHER_MODEL_NAME=${TEACHER_MODEL_NAME}

  ml:
    build:
      context: .
      dockerfile: src/ml/Containerfile
    volumes:
      - ./data:/data:z
      - models-data:/models
    environment:
      - DATA_ROOT=/data
      - MODELS_DIR=/models
      - TRAIN_POLL_SECONDS=10
      - TRAIN_MIN_INTERVAL_SECONDS=60
      - TRAIN_MIN_SAMPLES_DELTA=10
    command: ["python", "src/ml/train_loop.py"]

volumes:
  models-data:
    driver: local
    driver_opts:
      type: nfs
      o: addr=nfs.lan,nolock,soft,rw
      device: ":/slow/data/ml-models/handwriting/"
