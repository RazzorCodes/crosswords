services:
  app:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: src/app/Containerfile
      args:
        VITE_SRV_URL: http://localhost:8000
        VITE_TRAIN_MODE: "true"
    ports:
      - "5173:80"
    volumes:
      - browser-model-runtime:/app/models:ro
    environment:
      - APP_MODE=dev
      - MODEL_BASE_URL=/models
      - SRV_URL=http://localhost:8000
    depends_on:
      srv:
        condition: service_started
      models-init:
        condition: service_completed_successfully

  core-lab:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: src/core/ui/Containerfile
    ports:
      - "5174:80"
    volumes:
      - browser-model-runtime:/app/models:ro
    environment:
      - APP_MODE=core-lab
    depends_on:
      models-init:
        condition: service_completed_successfully

  models-init:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: src/ml/Containerfile
    volumes:
      - ./data:/data:ro,z
      - browser-model-runtime:/models
    environment:
      - DATA_ROOT=/data
      - MODELS_DIR=/models
      - ORT_WEB_VERSION=${ORT_WEB_VERSION:-1.26.0}
    command:
      - python
      - src/ml/generate_handwriting_artifacts.py
      - --models-dir
      - /models
      - --public-base-url
      - /models
      - --version
      - dev
      - --require-training

  srv:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: src/srv/Containerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data:z
    env_file:
      - .env
    environment:
      - DATA_ROOT=/data
      - EXTERNAL_TEACHER_ENABLED=${EXTERNAL_TEACHER_ENABLED:-0}
      - TEACHER_OPENAPI_ENDPOINT=${TEACHER_OPENAPI_ENDPOINT}
      - TEACHER_MODEL_NAME=${TEACHER_MODEL_NAME}

  ml:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: src/ml/Containerfile
    volumes:
      - ./data:/data:z
      - browser-model-runtime:/models
    environment:
      - DATA_ROOT=/data
      - MODELS_DIR=/models
      - TRAIN_POLL_SECONDS=10
      - TRAIN_MIN_INTERVAL_SECONDS=60
      - TRAIN_MIN_SAMPLES_DELTA=10
    command: ["python", "src/ml/train_loop.py"]

  app-release:
    profiles: ["release"]
    build:
      context: .
      dockerfile: src/app/Containerfile.release
    ports:
      - "5173:80"
    environment:
      - APP_MODE=release
      - MODEL_BASE_URL=${MODEL_BASE_URL:-https://github.com/RazzorCodes/crosswords/releases/latest/download}

volumes:
  browser-model-runtime:
