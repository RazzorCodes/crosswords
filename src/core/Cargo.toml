[package]
name = "core"
version = "0.1.0"
edition = "2021"

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[lib]
crate-type = ["rlib", "cdylib"]

[profile.release]
lto = true
opt-level = "s"
codegen-units = 1
strip = true
